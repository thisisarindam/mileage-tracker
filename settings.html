<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - Settings</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="has-bottom-nav">
  
  <div class="app-container mt-4 mb-5">
    <h2 class="fw-bold mb-4">Settings</h2>

    <div id="alert-container"></div>

    <div class="card app-card mb-4">
      <div class="card-body p-4">
        <form id="settings-form">
          <h5 class="mb-3 text-muted fs-6 text-uppercase fw-bold">Preferences</h5>
          
          <div class="mb-3">
            <label for="unit_system" class="form-label">Unit System</label>
            <select class="form-select py-2" id="unit_system" required>
              <option value="metric">Metric (Kilometers, Litres)</option>
              <option value="imperial">Imperial (Miles, Gallons)</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="currency" class="form-label">Currency</label>
            <select class="form-select py-2" id="currency" required>
              <option value="INR">₹ (INR)</option>
              <option value="USD">$ (USD)</option>
              <option value="EUR">€ (EUR)</option>
              <option value="GBP">£ (GBP)</option>
            </select>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary shadow-sm" id="save-btn">Save Settings</button>
          </div>
        </form>
      </div>
    </div>
    
    <div class="card app-card">
      <div class="card-body p-0">
        <button class="btn w-100 text-danger py-3 text-start fw-bold" onclick="window.logoutUser()" style="border-radius: 16px;">
          <i class="bi bi-box-arrow-right me-2"></i> Log Out
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-container">
      <a href="dashboard.html" class="nav-item">
        <i class="bi bi-house"></i>
        <span>Home</span>
      </a>
      <a href="history.html" class="nav-item">
        <i class="bi bi-clock-history"></i>
        <span>History</span>
      </a>
      <a href="analytics.html" class="nav-item">
        <i class="bi bi-graph-up"></i>
        <span>Analytics</span>
      </a>
      <a href="settings.html" class="nav-item active">
        <i class="bi bi-gear-fill"></i>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/settings.js"></script>
</body>
</html>
