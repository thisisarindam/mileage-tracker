<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Mileage Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
          <li class="nav-item"><a class="nav-link active" href="settings.html">Settings</a></li>
        </ul>
        <button class="btn btn-outline-danger" onclick="window.logoutUser()">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5" style="max-width: 600px;">
    <h2 class="mb-4">Settings</h2>

    <div id="alert-container"></div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form id="settings-form">
          <h5 class="mb-3">Preferences</h5>
          
          <div class="mb-3">
            <label for="unit_system" class="form-label">Unit System</label>
            <select class="form-select" id="unit_system" required>
              <option value="metric">Metric (Kilometers, Litres)</option>
              <option value="imperial">Imperial (Miles, Gallons)</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="currency" class="form-label">Currency</label>
            <select class="form-select" id="currency" required>
              <option value="INR">₹ (INR)</option>
              <option value="USD">$ (USD)</option>
              <option value="EUR">€ (EUR)</option>
              <option value="GBP">£ (GBP)</option>
            </select>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary" id="save-btn">Save Settings</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/settings.js"></script>
</body>
</html>
