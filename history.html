<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Mileage Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="history.html">History</a></li>
          <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
        </ul>
        <button class="btn btn-outline-danger" onclick="window.logoutUser()">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>History</h2>
    </div>

    <div id="alert-container"></div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Date</th>
                <th>Odometer</th>
                <th>Litres / Gallons</th>
                <th>Price/Unit</th>
                <th>Total Cost</th>
                <th>Station</th>
                <th>Notes</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="history-table-body">
              <tr><td colspan="8" class="text-center py-4 text-muted">Loading entries...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Entry Modal -->
  <div class="modal fade" id="editEntryModal" tabindex="-1" aria-labelledby="editEntryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editEntryModalLabel">Edit Fuel Entry</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="modal-alert-container"></div>
          <form id="edit-entry-form">
            <input type="hidden" id="edit_entry_id">
            <div class="mb-3">
              <label for="edit_entry_date" class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="edit_entry_date" required>
            </div>
            <div class="mb-3">
              <label for="edit_odometer_km" class="form-label">Odometer <span class="text-danger">*</span></label>
              <input type="number" step="0.1" class="form-control" id="edit_odometer_km" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_litres" class="form-label">Litres / Gallons <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="edit_litres" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_price_per_litre" class="form-label">Price per Unit <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="edit_price_per_litre" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="edit_total_cost" class="form-label">Total Cost <span class="text-danger">*</span></label>
              <input type="number" step="0.01" class="form-control" id="edit_total_cost" required readonly>
              <div class="form-text">Calculated automatically</div>
            </div>
            <div class="mb-3">
              <label for="edit_station_name" class="form-label">Station Name (Optional)</label>
              <input type="text" class="form-control" id="edit_station_name">
            </div>
            <div class="mb-3">
              <label for="edit_notes" class="form-label">Notes (Optional)</label>
              <textarea class="form-control" id="edit_notes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" form="edit-entry-form" class="btn btn-primary" id="update-entry-btn">Update Entry</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/history.js"></script>
</body>
</html>
