<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - History</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
</head>
<body class="has-bottom-nav">
  
  <div class="app-container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold mb-0">History</h2>
    </div>

    <div id="alert-container"></div>

    <!-- Last Month Stats Card -->
    <div class="card app-card mb-4 border-0">
      <div class="card-body p-3">
        <h6 class="text-muted small fw-bold mb-3">Last Month Summary (<span id="lm-month-name">--</span>)</h6>
        <div class="row text-center g-3">
          <div class="col-6 border-end border-secondary border-opacity-25">
            <div class="text-muted small"><i class="bi bi-currency-rupee currency-icon"></i> Spent</div>
            <h4 class="fw-bold mb-0" id="lm-spent">0</h4>
          </div>
          <div class="col-6">
            <div class="text-muted small"><i class="bi bi-graph-up"></i> Efficiency</div>
            <h4 class="fw-bold mb-0 text-success" id="lm-efficiency">0</h4>
          </div>
          <div class="col-12 my-2"><hr style="border-color: var(--glass-border); margin: 0;"></div>
          <div class="col-6 border-end border-secondary border-opacity-25">
            <div class="text-muted small"><i class="bi bi-signpost-split"></i> Distance</div>
            <h5 class="fw-bold mb-0" id="lm-distance">0</h5>
          </div>
          <div class="col-6">
            <div class="text-muted small"><i class="bi bi-fuel-pump"></i> Volume</div>
            <h5 class="fw-bold mb-0" id="lm-litres">0</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs Navigation -->
    <ul class="nav nav-pills mb-4 d-flex bg-secondary bg-opacity-10 p-1 rounded-pill" id="history-tabs" role="tablist">
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link active w-100 rounded-pill fw-bold" id="fuel-tab" data-bs-toggle="tab" data-bs-target="#fuel-tab-pane" type="button" role="tab" aria-controls="fuel-tab-pane" aria-selected="true">Fuel Fillups</button>
      </li>
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link w-100 rounded-pill fw-bold" id="maintenance-tab" data-bs-toggle="tab" data-bs-target="#maintenance-tab-pane" type="button" role="tab" aria-controls="maintenance-tab-pane" aria-selected="false">Maintenance</button>
      </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content" id="history-tabs-content">
      <!-- Fuel Tab -->
      <div class="tab-pane fade show active" id="fuel-tab-pane" role="tabpanel" aria-labelledby="fuel-tab" tabindex="0">
        <div id="history-logs-container">
          <div class="text-center py-4 text-muted">Loading entries...</div>
        </div>
        <div class="text-center mt-3 mb-4 d-none" id="load-more-container">
          <button class="btn btn-outline-primary rounded-pill px-4" id="load-more-btn">
            Load More <i class="bi bi-chevron-down ms-1"></i>
          </button>
        </div>
      </div>

      <!-- Maintenance Tab -->
      <div class="tab-pane fade" id="maintenance-tab-pane" role="tabpanel" aria-labelledby="maintenance-tab" tabindex="0">
        <div class="d-flex justify-content-end mb-3">
          <button class="btn btn-sm btn-primary rounded-pill px-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#addServiceModal">
            <i class="bi bi-plus-lg"></i> Add Service Log
          </button>
        </div>
        <div id="maintenance-logs-container">
          <div class="text-center py-4 text-muted">Loading service logs...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Entry Modal -->
  <div class="modal fade" id="editEntryModal" tabindex="-1" aria-labelledby="editEntryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editEntryModalLabel">Edit Fuel Entry</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="modal-alert-container"></div>
          <form id="edit-entry-form">
            <input type="hidden" id="edit_entry_id">
            <div class="mb-3">
              <label for="edit_entry_date" class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="edit_entry_date" required>
            </div>
            <div class="mb-3">
              <label for="edit_odometer_km" class="form-label">Odometer <span class="text-danger">*</span></label>
              <input type="number" step="0.1" class="form-control" id="edit_odometer_km" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_litres" class="form-label">Litres / Gallons <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="edit_litres" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_price_per_litre" class="form-label">Price per Unit <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="edit_price_per_litre" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="edit_total_cost" class="form-label">Total Cost <span class="text-danger">*</span></label>
              <input type="number" step="0.01" class="form-control" id="edit_total_cost" required readonly>
              <div class="form-text">Calculated automatically</div>
            </div>
            <div class="mb-3">
              <label for="edit_station_name" class="form-label">Station Name (Optional)</label>
              <input type="text" class="form-control" id="edit_station_name">
            </div>
            <div class="mb-3">
              <label for="edit_notes" class="form-label">Notes (Optional)</label>
              <textarea class="form-control" id="edit_notes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" form="edit-entry-form" class="btn btn-primary" id="update-entry-btn">Update Entry</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Service Modal -->
  <div class="modal fade" id="addServiceModal" tabindex="-1" aria-labelledby="addServiceModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addServiceModalLabel">Add Service Log</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="service-modal-alert-container"></div>
          <form id="add-service-form">
            <div class="mb-3">
              <label for="service_date" class="form-label">Service Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="service_date" required>
            </div>
            <div class="mb-3">
              <label for="service_type" class="form-label">Service Type <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="service_type" placeholder="e.g. General Servicing, Oil Change" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="service_odometer" class="form-label">Odometer <span class="text-danger">*</span></label>
                <input type="number" step="0.1" class="form-control" id="service_odometer" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="service_cost" class="form-label">Total Cost <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="service_cost" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="service_notes" class="form-label">Notes (Optional)</label>
              <textarea class="form-control" id="service_notes" rows="3" placeholder="What was replaced or checked?"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" form="add-service-form" class="btn btn-primary" id="save-service-btn">Save Log</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-container">
      <a href="dashboard.html" class="nav-item">
        <i class="bi bi-house"></i>
        <span>Home</span>
      </a>
      <a href="history.html" class="nav-item active">
        <i class="bi bi-clock-history"></i>
        <span>History</span>
      </a>
      <a href="analytics.html" class="nav-item">
        <i class="bi bi-graph-up"></i>
        <span>Analytics</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/history.js"></script>
</body>
</html>
