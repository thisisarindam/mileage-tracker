<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mileage Tracker - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: transparent; /* No card background on splash */
      border: none;
    }
    .app-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-color), #0a58ca);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
    }
    .app-logo svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-5">
        <div class="app-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
            <path d="M8 2a.5.5 0 0 1 .5.5v11a.5.5 0 0 1-1 0v-11A.5.5 0 0 1 8 2Z"/>
            <path d="M4.354 5.646a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708l3-3a.5.5 0 0 1 .708 0Zm7.292 0a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708Z"/>
          </svg>
        </div>
        <h2 class="fw-bold mb-1">Mileage Tracker</h2>
        <p class="text-muted" id="form-subtitle">Sign in to continue</p>
      </div>

      <div id="alert-container"></div>

      <form id="auth-form">
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
          <label for="email" class="text-muted">Email address</label>
        </div>
        <div class="form-floating mb-4" id="password-container">
          <input type="password" class="form-control" id="password" placeholder="Password">
          <label for="password" class="text-muted">Password</label>
        </div>

        <button class="btn btn-primary w-100 py-3 mb-3 fw-bold shadow-sm" type="submit" id="submit-btn" style="font-size: 1.1rem;">Sign In</button>
        <button class="btn btn-outline-secondary w-100 py-2 mb-4" type="button" id="magic-link-btn" style="border-radius: 100px;">Send Magic Link</button>
        <button class="btn btn-outline-secondary w-100 py-2 mb-4 d-none" type="button" id="resend-verification-btn" style="border-radius: 100px;">Resend Verification Email</button>
      </form>

      <div class="text-center mt-3">
        <span class="text-muted" id="toggle-text">Don't have an account?</span>
        <a href="#" id="toggle-mode" class="text-decoration-none fw-bold ms-1" style="color: var(--primary-color);">Sign Up</a>
      </div>

      <div class="text-center mt-5 mb-2">
        <small class="text-muted" style="font-size: 0.75rem;">&copy; 2026 Made by Arindam Maity</small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Update subtitle when toggling
    document.getElementById('toggle-mode').addEventListener('click', (e) => {
      setTimeout(() => {
        const isSignUp = document.getElementById('submit-btn').innerText === 'Sign Up';
        document.getElementById('form-subtitle').innerText = isSignUp ? 'Create a new account' : 'Sign in to continue';
      }, 50);
    });
  </script>
</body>
</html>
