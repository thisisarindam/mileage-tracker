<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">

  <main class="form-signin w-100 m-auto" style="max-width: 400px; padding: 15px;">
    <div class="card shadow">
      <div class="card-body p-4">
        <h1 class="h3 mb-3 fw-normal text-center" id="form-title">Sign In</h1>

        <div id="alert-container"></div>

        <form id="auth-form">
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
            <label for="email">Email address</label>
          </div>
          <div class="form-floating mb-3" id="password-container">
            <input type="password" class="form-control" id="password" placeholder="Password">
            <label for="password">Password</label>
          </div>

          <button class="btn btn-primary w-100 py-2 mb-2" type="submit" id="submit-btn">Sign In</button>
          <button class="btn btn-outline-secondary w-100 py-2 mb-3" type="button" id="magic-link-btn">Send Magic
            Link</button>
        </form>

        <div class="text-center mt-3">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" id="toggle-mode" class="text-decoration-none">Sign Up</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
