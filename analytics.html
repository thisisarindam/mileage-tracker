<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="has-bottom-nav">
  
  <div class="app-container mt-4 mb-5">
    <h2 class="fw-bold mb-4">Analytics</h2>

    <div id="alert-container"></div>

    <div class="row">
      <div class="col-lg-6 mb-4">
        <div class="card app-card h-100">
          <div class="card-body">
            <h5 class="card-title text-center mb-3 text-muted">Fuel Efficiency Over Time</h5>
            <canvas id="efficiencyChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-lg-6 mb-4">
        <div class="card app-card h-100">
          <div class="card-body">
            <h5 class="card-title text-center mb-3 text-muted">Total Spent Per Month</h5>
            <canvas id="costChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="bottom-nav-container">
      <a href="dashboard.html" class="nav-item">
        <i class="bi bi-house"></i>
        <span>Home</span>
      </a>
      <a href="history.html" class="nav-item">
        <i class="bi bi-clock-history"></i>
        <span>History</span>
      </a>
      <a href="analytics.html" class="nav-item active">
        <i class="bi bi-graph-up"></i>
        <span>Analytics</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/analytics.js"></script>
</body>
</html>
