<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mileage Tracker - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  
  <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Mileage Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="history.html">History</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="analytics.html">Analytics</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="settings.html">Settings</a>
          </li>
        </ul>
        <button class="btn btn-outline-danger" onclick="window.logoutUser()">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Dashboard</h2>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEntryModal">
        + Add Fuel Entry
      </button>
    </div>

    <!-- Quick Stats -->
    <div class="row mb-4">
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title text-muted">Total Fuel Spent</h5>
            <h3 class="card-text" id="stat-total-spent">--</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title text-muted">Total Distance</h5>
            <h3 class="card-text" id="stat-total-distance">--</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title text-muted">Avg Efficiency</h5>
            <h3 class="card-text" id="stat-avg-efficiency">--</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Section: Table and Chart -->
    <div class="row mb-5">
      <!-- Recent Entries Table -->
      <div class="col-lg-8 mb-4 mb-lg-0">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-body-tertiary d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Recent Entries</h5>
            <a href="history.html" class="btn btn-sm btn-outline-secondary">View All</a>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Date</th>
                    <th>Odometer</th>
                    <th>Litres</th>
                    <th>Price/Unit</th>
                    <th>Total Cost</th>
                    <th>Station</th>
                  </tr>
                </thead>
                <tbody id="entries-table-body">
                  <tr><td colspan="6" class="text-center py-4 text-muted">Loading entries...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Monthly Spending Chart -->
      <div class="col-lg-4">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-body-tertiary">
            <h5 class="mb-0">Monthly Spending</h5>
          </div>
          <div class="card-body">
            <canvas id="dashboardCostChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Entry Modal -->
  <div class="modal fade" id="addEntryModal" tabindex="-1" aria-labelledby="addEntryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addEntryModalLabel">Add Fuel Entry</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="modal-alert-container"></div>
          <form id="add-entry-form">
            <div class="mb-3">
              <label for="entry_date" class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" id="entry_date" required>
            </div>
            <div class="mb-3">
              <label for="odometer_km" class="form-label">Odometer <span class="text-danger">*</span></label>
              <input type="number" step="0.1" class="form-control" id="odometer_km" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="litres" class="form-label">Litres / Gallons <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="litres" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="price_per_litre" class="form-label">Price per Unit <span class="text-danger">*</span></label>
                <input type="number" step="0.01" class="form-control" id="price_per_litre" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="total_cost" class="form-label">Total Cost <span class="text-danger">*</span></label>
              <input type="number" step="0.01" class="form-control" id="total_cost" required readonly>
              <div class="form-text">Calculated automatically</div>
            </div>
            <div class="mb-3">
              <label for="station_name" class="form-label">Station Name (Optional)</label>
              <input type="text" class="form-control" id="station_name">
            </div>
            <div class="mb-3">
              <label for="notes" class="form-label">Notes (Optional)</label>
              <textarea class="form-control" id="notes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" form="add-entry-form" class="btn btn-primary" id="save-entry-btn">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script>
    // Verify session
    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
      }
    });

    window.logoutUser = async () => {
      try {
        const { error } = await supabaseClient.auth.signOut();
        if (error) throw error;
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Error logging out:', error.message);
      }
    };
  </script>
  <script src="js/dashboard.js"></script>
</body>
</html>
